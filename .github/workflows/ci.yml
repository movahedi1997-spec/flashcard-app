name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck

    env:
      # Minimal env so Next.js build succeeds without a real DB connection.
      # Real secrets are injected by the deploy jobs below.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
      ACCESS_JWT_SECRET: ci-placeholder-access-secret-32chars
      REFRESH_JWT_SECRET: ci-placeholder-refresh-secret-32chars
      NEXT_PUBLIC_APP_NAME: FlashCard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
