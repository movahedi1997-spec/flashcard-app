name: Deploy

on:
  # Staging: auto-deploy on every push to main
  push:
    branches: [main]
  # Production: deploy on version tags (e.g. v1.0.0)
  push:
    tags: ['v*.*.*']

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── Run DB migrations before deploying code ───────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        # Executes each .sql file in migrations/ in alphabetical order.
        # Uses psql from the ubuntu runner; the DATABASE_URL secret is injected
        # from the environment defined in GitHub → Settings → Environments.
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f …"
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy application ────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACCESS_JWT_SECRET: ${{ secrets.ACCESS_JWT_SECRET }}
          REFRESH_JWT_SECRET: ${{ secrets.REFRESH_JWT_SECRET }}
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      # ── Vercel deploy (swap for your own platform as needed) ──────────────
      - name: Deploy to Vercel (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx vercel --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npx vercel --token "$VERCEL_TOKEN" --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
